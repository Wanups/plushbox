<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plush Box — Collection</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --silver: #c8c8c8;
      --silver-light: #e8e8e8;
      --silver-dark: #8a8a8a;
      --gold: #d4a853;
      --bg: #0a0a0a;
      --bg2: #111111;
      --bg3: #1a1a1a;
      --border: rgba(200,200,200,0.12);
      --text: #e8e8e8;
      --text2: #888;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 24px 80px;
      position: relative;
      z-index: 1;
    }

    header {
      padding: 60px 0 40px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      margin-bottom: 48px;
    }

    .header-eyebrow {
      font-size: 10px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--silver-dark);
      margin-bottom: 16px;
    }

    .header-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(36px, 6vw, 64px);
      font-weight: 300;
      letter-spacing: 8px;
      text-transform: uppercase;
      color: #f0f0f0;
      line-height: 1;
    }

    .header-line {
      width: 80px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--silver), transparent);
      margin: 20px auto;
    }

    .header-username {
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--silver);
    }

    .header-username span { color: #f0f0f0; font-weight: 500; }

    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 48px;
      margin-bottom: 56px;
      flex-wrap: wrap;
    }

    .stat { text-align: center; }
    .stat-value {
      font-family: 'Cormorant Garamond', serif;
      font-size: 36px;
      font-weight: 300;
      color: #f0f0f0;
      line-height: 1;
    }
    .stat-label {
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text2);
      margin-top: 6px;
    }
    .stat-divider { width: 1px; background: var(--border); align-self: stretch; }

    .global-nav {
      display: flex;
      justify-content: center;
      margin-bottom: 32px;
    }

    .filters {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }

    .filter-btn {
      font-family: 'Montserrat', sans-serif;
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 8px 18px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text2);
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn:hover, .filter-btn.active {
      border-color: var(--silver);
      color: var(--silver-light);
      background: rgba(200,200,200,0.05);
    }

    .filter-btn.active.legendary { border-color: var(--gold); color: var(--gold); }
    .filter-btn.active.epic      { border-color: #c084fc; color: #c084fc; }
    .filter-btn.active.rare      { border-color: #60a5fa; color: #60a5fa; }

    .rarity-section { margin-bottom: 56px; }
    .rarity-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }
    .rarity-line { flex: 1; height: 1px; background: var(--border); }
    .rarity-label {
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .rarity-label.legendary { color: var(--gold); }
    .rarity-label.epic      { color: #c084fc; }
    .rarity-label.rare      { color: #60a5fa; }
    .rarity-label.common    { color: var(--text2); }

    .rarity-count { font-size: 11px; letter-spacing: 2px; color: var(--text2); }

    .plush-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 12px;
    }

    .plush-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      position: relative;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      animation: fadeIn 0.4s ease both;
      cursor: pointer;
    }

    .plush-card:hover { transform: translateY(-4px); border-color: var(--silver-dark); background: var(--bg3); }

    /* SILHOUETTE LOGIC - Solid Light Gray Shadow */
    .plush-card.locked .plush-img, 
    .modal-content.locked .modal-img {
      filter: brightness(0) invert(0.3); /* Crée une ombre chinoise grise uniforme sans détails */
      opacity: 0.8;
      transition: all 0.3s;
    }

    .plush-card.locked .plush-emoji,
    .modal-content.locked .modal-emoji {
      filter: grayscale(1) blur(15px);
      opacity: 0.1;
    }

    .plush-card.locked .plush-name { opacity: 0.5; letter-spacing: 4px; }

    .plush-card.legendary { border-color: rgba(212,168,83,0.3); }
    .plush-card.epic      { border-color: rgba(192,132,252,0.2); }
    .plush-card.rare      { border-color: rgba(96,165,250,0.15); }

    .plush-card.legendary:hover { border-color: rgba(212,168,83,0.7); box-shadow: 0 10px 30px -10px rgba(212,168,83,0.2); }
    .plush-card.epic:hover      { border-color: rgba(192,132,252,0.5); box-shadow: 0 10px 30px -10px rgba(192,132,252,0.15); }

    .plush-img-wrap {
      width: 80px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.3s;
    }
    .plush-card:hover .plush-img-wrap { transform: scale(1.1); }

    .plush-img { width: 80px; height: 80px; object-fit: contain; }
    .plush-emoji { font-size: 52px; line-height: 1; }
    .plush-name { font-size: 9px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--text); text-align: center; line-height: 1.4; }
    .plush-rarity { font-size: 8px; letter-spacing: 1.5px; text-transform: uppercase; }
    .plush-rarity.legendary { color: var(--gold); }
    .plush-rarity.epic      { color: #c084fc; }
    .plush-rarity.rare      { color: #60a5fa; }
    .plush-rarity.common    { color: var(--text2); }

    .plush-number { 
      position: absolute; 
      top: 8px; 
      left: 8px; 
      font-size: 10px; 
      font-weight: 600; 
      color: var(--text2); 
      letter-spacing: 1px;
      opacity: 0.6;
    }

    .plush-count { 
      position: absolute; 
      top: 6px; 
      right: 8px; 
      font-size: 18px; 
      font-weight: 700; 
      color: var(--gold); 
      letter-spacing: -0.5px; 
      text-shadow: 0 0 12px rgba(0,0,0,0.9);
      z-index: 5;
    }

    /* MODAL */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.98);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s;
      padding: 24px;
    }
    .modal-overlay.active { opacity: 1; pointer-events: auto; }

    .modal-content {
      max-width: 700px;
      width: 100%;
      background: var(--bg2);
      border: 1px solid var(--border);
      padding: 60px 40px;
      position: relative;
      text-align: center;
      transform: translateY(20px);
      transition: transform 0.4s;
    }
    .modal-overlay.active .modal-content { transform: translateY(0); }

    .modal-close {
      position: absolute;
      top: 20px;
      right: 20px;
      background: transparent;
      border: none;
      color: var(--text2);
      font-size: 28px;
      cursor: pointer;
      padding: 10px;
      z-index: 10;
    }

    .modal-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      color: var(--text);
      width: 50px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 24px;
      user-select: none;
    }
    .modal-nav:hover { background: rgba(255,255,255,0.1); border-color: var(--silver); }
    .modal-nav.prev { left: -70px; }
    .modal-nav.next { right: -70px; }

    .modal-img-wrap {
      width: 320px;
      height: 320px;
      margin: 0 auto 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-img { max-width: 100%; max-height: 100%; object-fit: contain; transform: scale(1.2); transition: filter 0.3s; }
    .modal-emoji { font-size: 180px; }

    /* Teintes silhouettes dans la modale */
    .modal-content.locked .modal-img { opacity: 0.9; }

    .modal-content.locked .modal-emoji { filter: blur(30px); opacity: 0.1; }

    .modal-rarity {
      font-size: 11px;
      letter-spacing: 5px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    .modal-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 42px;
      font-weight: 300;
      letter-spacing: 6px;
      text-transform: uppercase;
      margin-bottom: 24px;
    }
    .modal-desc {
      font-size: 13px;
      color: var(--text2);
      line-height: 1.8;
      max-width: 400px;
      margin: 0 auto;
    }

    .empty-state { text-align: center; padding: 80px 20px; }
    .empty-state-title { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 300; color: var(--text2); margin-bottom: 12px; }
    .empty-state-sub { font-size: 11px; letter-spacing: 2px; color: var(--text2); opacity: 0.5; }

    .loading { text-align: center; padding: 100px 20px; }
    .loading-spinner { width: 32px; height: 32px; border: 1px solid var(--border); border-top-color: var(--silver); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
    .loading-text { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--text2); }

    footer { text-align: center; padding-top: 40px; border-top: 1px solid var(--border); margin-top: 40px; }
    .footer-text { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--text2); opacity: 0.5; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 900px) {
      .modal-nav.prev { left: 10px; border-radius: 0 4px 4px 0; }
      .modal-nav.next { right: 10px; border-radius: 4px 0 0 4px; }
    }

    @media (max-width: 600px) {
      .stats-bar { gap: 24px; }
      .stat-divider { display: none; }
      .plush-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; }
      .modal-content { padding: 40px 20px; }
      .modal-img-wrap { width: 200px; height: 200px; }
      .modal-name { font-size: 28px; }
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <div class="header-eyebrow">Collection personnelle</div>
    <div class="header-logo">Plush Box</div>
    <div class="header-line"></div>
    <div class="header-username">Viewer : <span id="display-username">—</span></div>
  </header>

  <div id="stats-bar" class="stats-bar" style="display:none">
    <div class="stat">
      <div class="stat-value" id="stat-owned">0</div>
      <div class="stat-label">Obtenues</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <div class="stat-value" id="stat-total">0</div>
      <div class="stat-label">Collection</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <div class="stat-value" id="stat-score">0</div>
      <div class="stat-label">Points</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <div class="stat-value" id="stat-pct">0%</div>
      <div class="stat-label">Complété</div>
    </div>
  </div>

  <a id="passport-shortcut" href="#" class="nav-shortcut" title="Voir mon Passeport">
    <div class="nav-shortcut-icon">🛂</div>
    <div class="nav-shortcut-label">Passeport</div>
  </a>

  <style>
    .nav-shortcut {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-decoration: none;
      z-index: 100;
      transition: transform 0.2s;
      background: rgba(255,255,255,0.03);
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    .nav-shortcut:hover { transform: translateY(-3px); background: rgba(255,255,255,0.08); border-color: var(--silver); }
    .nav-shortcut-icon { font-size: 24px; margin-bottom: 4px; }
    .nav-shortcut-label { font-size: 8px; text-transform: uppercase; letter-spacing: 1px; color: var(--text2); font-weight: 600; }

    @media (max-width: 600px) {
      .nav-shortcut { top: 10px; right: 10px; padding: 6px; }
      .nav-shortcut-icon { font-size: 18px; }
    }
  </style>

  <script>
    // Ajout du lien dynamique dans l'init
    function updateShortcuts() {
      const pLink = document.getElementById('passport-shortcut');
      if (pLink && username) pLink.href = 'passport.html?user=' + username;
    }
  </script>

  <div id="global-nav" class="global-nav" style="display:none">
    <a href="leaderboard.html" class="filter-btn" style="text-decoration:none; border-color:var(--gold); color:var(--gold)">Classement Global</a>
  </div>

  <div id="filters" class="filters" style="display:none">
    <button class="filter-btn active" onclick="filterRarity('all', this)">Tout</button>
    <button class="filter-btn legendary" onclick="filterRarity('legendary', this)">Légendaire</button>
    <button class="filter-btn epic" onclick="filterRarity('epic', this)">Épique</button>
    <button class="filter-btn rare" onclick="filterRarity('rare', this)">Rare</button>
    <button class="filter-btn" onclick="filterRarity('common', this)">Commun</button>
    <button class="filter-btn" onclick="filterRarity('owned', this)">Obtenues</button>
    <button class="filter-btn" onclick="filterRarity('missing', this)">Manquantes</button>
  </div>

  <div id="main-content">
    <div class="loading">
      <div class="loading-spinner"></div>
      <div class="loading-text">Chargement de la collection</div>
    </div>
  </div>

  <footer>
    <div class="footer-text">Plush Box · Mystery Collection · WANUPS</div>
  </footer>
</div>

<!-- MODALE D'APERÇU -->
<div id="plush-modal" class="modal-overlay" onclick="closeModal()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    
    <div class="modal-nav prev" onclick="navigatePlush(-1)">&#10094;</div>
    <div class="modal-nav next" onclick="navigatePlush(1)">&#10095;</div>

    <div id="modal-body">
      <!-- Rempli par JS -->
    </div>
  </div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
var GITHUB_USER = 'Wanups';
var GITHUB_REPO = 'plushbox';

var RARITY_LABELS = { common:'Commun', rare:'Rare', epic:'Épique', legendary:'Légendaire' };
var RARITY_POINTS = { common:1, rare:5, epic:20, legendary:100 };
var RARITY_COLORS = { common:'#9ca3af', rare:'#60a5fa', epic:'#c084fc', legendary:'#fbbf24' };

var PLUSHIES = [];
var filteredPlushies = []; // Liste des peluches actuellement affichées
var allCollections = {};
var userCollection = {};
var currentFilter  = 'all';
var username       = '';
var currentPlushIdx = -1; // Index dans filteredPlushies

// ── INIT ──────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', function() {
  var params = new URLSearchParams(window.location.search);
  username   = (params.get('user') || '').toLowerCase().trim();

  if (!username) {
    showError('Aucun viewer spécifié.', 'Utilise le lien fourni dans le chat Twitch.');
    return;
  }

  document.getElementById('display-username').textContent = username;
  loadCollections();
  updateShortcuts();

  // Navigation au clavier
  window.addEventListener('keydown', function(e) {
    if (!document.getElementById('plush-modal').classList.contains('active')) return;
    if (e.key === 'ArrowLeft') navigatePlush(-1);
    if (e.key === 'ArrowRight') navigatePlush(1);
    if (e.key === 'Escape') closeModal();
  });
});

// ── CHARGEMENT DATA ───────────────────────────────────────────────────────────
function loadCollections() {
  var baseUrl = 'https://raw.githubusercontent.com/' + GITHUB_USER + '/' + GITHUB_REPO + '/main/';
  Promise.all([
    fetch(baseUrl + 'collections.json?t=' + Date.now()).then(function(r){return r.json();}),
    fetch(baseUrl + 'plushies.json?t=' + Date.now()).then(function(r){return r.json();})
  ])
  .then(function(results) {
    allCollections = results[0] || {};
    userCollection = allCollections[username] || {};
    if (Array.isArray(results[1]) && results[1].length > 0) {
      PLUSHIES = results[1];
    }
    render();
  })
  .catch(function(e) {
    console.error('Erreur chargement:', e);
    showError('Collection introuvable.', 'Ouvre une Plush Box sur le stream !');
  });
}

// ── CALCULS ───────────────────────────────────────────────────────────────────
function computeScore() {
  var score = 0;
  PLUSHIES.forEach(function(p) {
    score += (userCollection[p.id] || 0) * (RARITY_POINTS[p.rarity] || 1);
  });
  return score;
}

// ── RENDU GRILLE ──────────────────────────────────────────────────────────────
function render() {
  var owned = PLUSHIES.filter(function(p) { return userCollection[p.id]; });
  var total = PLUSHIES.length;
  var score = computeScore();

  document.getElementById('stat-owned').textContent = owned.length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-score').textContent = score;
  document.getElementById('stat-pct').textContent   = Math.round(owned.length / total * 100) + '%';
  document.getElementById('stats-bar').style.display = '';
  document.getElementById('global-nav').style.display = '';
  document.getElementById('filters').style.display   = '';

  renderGrid(currentFilter);
}

function renderGrid(filter) {
  var content  = document.getElementById('main-content');
  var rarities = ['legendary','epic','rare','common'];
  var html     = '';
  filteredPlushies = []; // On réinitialise la liste filtrée

  rarities.forEach(function(rarity) {
    var list = PLUSHIES.filter(function(p) { return p.rarity === rarity; });

    if (filter === 'owned')   list = list.filter(function(p) { return userCollection[p.id]; });
    if (filter === 'missing') list = list.filter(function(p) { return !userCollection[p.id]; });
    if (filter !== 'all' && filter !== 'owned' && filter !== 'missing' && filter !== rarity) return;
    if (list.length === 0) return;

    // On ajoute les peluches de cette rareté à la liste filtrée pour la navigation
    filteredPlushies = filteredPlushies.concat(list);

    var ownedInRarity = list.filter(function(p) { return userCollection[p.id]; }).length;

    html += '<div class="rarity-section">';
    html += '<div class="rarity-header"><div class="rarity-line"></div>';
    html += '<div class="rarity-label ' + rarity + '">' + RARITY_LABELS[rarity].toUpperCase() + '</div>';
    html += '<div class="rarity-count">' + ownedInRarity + ' / ' + list.length + '</div>';
    html += '<div class="rarity-line"></div></div>';
    html += '<div class="plush-grid">';

    list.forEach(function(p, i) {
      var count   = userCollection[p.id] || 0;
      var locked  = count === 0 ? 'locked' : '';
      var numStr  = p.number ? '#' + p.number.toString().padStart(3, '0') : '';
      
      var imgHtml = p.image && p.image !== ''
        ? '<img class="plush-img" src="' + p.image + '" alt="' + p.name + '" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'block\'">'
          + '<div class="plush-emoji" style="display:none">' + p.emoji + '</div>'
        : '<div class="plush-emoji">' + p.emoji + '</div>';

      html += '<div class="plush-card ' + rarity + ' ' + locked + '" style="animation-delay:' + (i * 0.02) + 's" onclick="openModalById(\'' + p.id + '\')">';
      if (numStr) html += '<div class="plush-number">' + numStr + '</div>';
      if (count > 1) html += '<div class="plush-count">×' + count + '</div>';
      html += '<div class="plush-img-wrap">' + imgHtml + '</div>';
      html += '<div class="plush-name">' + (locked ? '???????' : p.name) + '</div>';
      html += '<div class="plush-rarity ' + rarity + '">' + (locked ? '—' : RARITY_LABELS[rarity]) + '</div>';
      html += '</div>';
    });

    html += '</div></div>';
  });

  if (html === '') {
    html = '<div class="empty-state"><div class="empty-state-title">Aucune peluche</div></div>';
  }
  content.innerHTML = html;
}

// ── MODALE ────────────────────────────────────────────────────────────────────
function openModalById(plushId) {
  var idx = filteredPlushies.findIndex(function(p) { return p.id === plushId; });
  if (idx !== -1) updateModalContent(idx);
}

function navigatePlush(direction) {
  if (filteredPlushies.length === 0) return;
  
  var newIdx = currentPlushIdx + direction;
  if (newIdx < 0) newIdx = filteredPlushies.length - 1;
  if (newIdx >= filteredPlushies.length) newIdx = 0;
  updateModalContent(newIdx);
}

function updateModalContent(idx) {
  currentPlushIdx = idx;
  var plush = filteredPlushies[idx];
  if (!plush) return;

  var count  = userCollection[plush.id] || 0;
  var locked = count === 0;
  var modal  = document.getElementById('plush-modal');
  var content = document.querySelector('.modal-content');
  var body   = document.getElementById('modal-body');

  content.className = 'modal-content ' + plush.rarity + (locked ? ' locked' : '');

  var imgHtml = plush.image && plush.image !== ''
    ? '<img class="modal-img" src="' + plush.image + '" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'block\'">'
      + '<div class="modal-emoji" style="display:none">' + plush.emoji + '</div>'
    : '<div class="modal-emoji">' + plush.emoji + '</div>';

  var name   = locked ? 'Mystère' : plush.name;
  var numStr = plush.number ? '#' + plush.number.toString().padStart(3, '0') : '';
  var rarity = RARITY_LABELS[plush.rarity];
  var desc   = locked 
    ? "Cette peluche n'a pas encore rejoint ta collection. Continue d'ouvrir des boites pour la découvrir !" 
    : "Félicitations ! Tu possèdes cette peluche en <b>" + count + "</b> exemplaire(s).";

  body.innerHTML = 
    '<div class="modal-img-wrap">' + imgHtml + '</div>' +
    '<div class="modal-rarity" style="color:' + RARITY_COLORS[plush.rarity] + '">' + rarity + ' ' + numStr + '</div>' +
    '<div class="modal-name">' + name + '</div>' +
    '<div class="modal-desc">' + desc + '</div>';

  modal.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('plush-modal').classList.remove('active');
  document.body.style.overflow = '';
}

function filterRarity(rarity, btn) {
  currentFilter = rarity;
  document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  renderGrid(rarity);
}

function showError(title, sub) {
  document.getElementById('main-content').innerHTML =
    '<div class="empty-state"><div class="empty-state-title">' + title + '</div><div class="empty-state-sub">' + sub + '</div></div>';
}
</script>
