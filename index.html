<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plush Box — Collection</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --silver: #c8c8c8;
      --silver-light: #e8e8e8;
      --silver-dark: #8a8a8a;
      --gold: #d4a853;
      --bg: #0a0a0a;
      --bg2: #111111;
      --bg3: #1a1a1a;
      --border: rgba(200,200,200,0.12);
      --text: #e8e8e8;
      --text2: #888;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      min-height: 100vh;
    }

    /* FOND GRAIN */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 24px 80px;
      position: relative;
      z-index: 1;
    }

    /* HEADER */
    header {
      padding: 60px 0 40px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      margin-bottom: 48px;
    }

    .header-eyebrow {
      font-size: 10px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--silver-dark);
      margin-bottom: 16px;
    }

    .header-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(36px, 6vw, 64px);
      font-weight: 300;
      letter-spacing: 8px;
      text-transform: uppercase;
      color: #f0f0f0;
      line-height: 1;
    }

    .header-line {
      width: 80px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--silver), transparent);
      margin: 20px auto;
    }

    .header-username {
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--silver);
    }

    .header-username span {
      color: #f0f0f0;
      font-weight: 500;
    }

    /* STATS */
    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 48px;
      margin-bottom: 56px;
      flex-wrap: wrap;
    }

    .stat {
      text-align: center;
    }

    .stat-value {
      font-family: 'Cormorant Garamond', serif;
      font-size: 36px;
      font-weight: 300;
      color: #f0f0f0;
      line-height: 1;
    }

    .stat-label {
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text2);
      margin-top: 6px;
    }

    .stat-divider {
      width: 1px;
      background: var(--border);
      align-self: stretch;
    }

    /* FILTRES */
    .filters {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }

    .filter-btn {
      font-family: 'Montserrat', sans-serif;
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 8px 18px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text2);
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn:hover,
    .filter-btn.active {
      border-color: var(--silver);
      color: var(--silver-light);
      background: rgba(200,200,200,0.05);
    }

    .filter-btn.active.legendary { border-color: var(--gold); color: var(--gold); }
    .filter-btn.active.epic      { border-color: #c084fc; color: #c084fc; }
    .filter-btn.active.rare      { border-color: #60a5fa; color: #60a5fa; }

    /* SECTION RARETÉ */
    .rarity-section { margin-bottom: 56px; }

    .rarity-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    .rarity-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .rarity-label {
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .rarity-label.legendary { color: var(--gold); }
    .rarity-label.epic      { color: #c084fc; }
    .rarity-label.rare      { color: #60a5fa; }
    .rarity-label.common    { color: var(--text2); }

    .rarity-count {
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--text2);
    }

    /* GRILLE */
    .plush-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 12px;
    }

    /* CARTE PELUCHE */
    .plush-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      position: relative;
      transition: border-color 0.2s, transform 0.2s;
      animation: fadeIn 0.4s ease both;
    }

    .plush-card:hover {
      transform: translateY(-2px);
    }

    .plush-card.locked {
      opacity: 0.2;
      filter: grayscale(1);
    }

    .plush-card.legendary { border-color: rgba(212,168,83,0.3); }
    .plush-card.epic      { border-color: rgba(192,132,252,0.2); }
    .plush-card.rare      { border-color: rgba(96,165,250,0.15); }

    .plush-card.legendary:hover { border-color: rgba(212,168,83,0.7); }
    .plush-card.epic:hover      { border-color: rgba(192,132,252,0.5); }
    .plush-card.rare:hover      { border-color: rgba(96,165,250,0.4); }

    /* Halo rareté */
    .plush-card.legendary::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 40%, rgba(212,168,83,0.08) 0%, transparent 70%);
      pointer-events: none;
    }
    .plush-card.epic::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 40%, rgba(192,132,252,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    .plush-img-wrap {
      width: 80px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .plush-img {
      width: 80px;
      height: 80px;
      object-fit: contain;
    }

    .plush-emoji {
      font-size: 52px;
      line-height: 1;
    }

    .plush-name {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text);
      text-align: center;
      line-height: 1.4;
    }

    .plush-rarity {
      font-size: 8px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
    .plush-rarity.legendary { color: var(--gold); }
    .plush-rarity.epic      { color: #c084fc; }
    .plush-rarity.rare      { color: #60a5fa; }
    .plush-rarity.common    { color: var(--text2); }

    .plush-count {
      position: absolute;
      top: 8px;
      right: 8px;
      font-size: 9px;
      font-weight: 500;
      color: var(--text2);
      letter-spacing: 0.5px;
    }

    /* ETAT VIDE */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
    }

    .empty-state-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 300;
      color: var(--text2);
      margin-bottom: 12px;
    }

    .empty-state-sub {
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--text2);
      opacity: 0.5;
    }

    /* LOADING */
    .loading {
      text-align: center;
      padding: 100px 20px;
    }

    .loading-spinner {
      width: 32px;
      height: 32px;
      border: 1px solid var(--border);
      border-top-color: var(--silver);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    .loading-text {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text2);
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding-top: 40px;
      border-top: 1px solid var(--border);
      margin-top: 40px;
    }

    .footer-text {
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text2);
      opacity: 0.5;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* RESPONSIVE */
    @media (max-width: 600px) {
      .stats-bar { gap: 24px; }
      .stat-divider { display: none; }
      .plush-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; }
    }
  </style>
</head>

</div>

var allCollections = {};
var userCollection = {};
var currentFilter  = 'all';
var username       = '';

// ── INIT ──────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', function() {
  var params = new URLSearchParams(window.location.search);
  username   = (params.get('user') || '').toLowerCase().trim();

  if (!username) {
    showError('Aucun viewer spécifié.', 'Utilise le lien fourni dans le chat Twitch.');
    return;
  }

  document.getElementById('display-username').textContent = username;
  loadCollections();
});

// ── CHARGEMENT DATA SE ────────────────────────────────────────────────────────
function loadCollections() {
  // Lit le fichier JSON directement depuis GitHub (public, pas besoin d'auth)
  var url = 'https://raw.githubusercontent.com/Wanups/plushbox/main/collections.json?t=' + Date.now();
  fetch(url)
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function(data) {
      allCollections = data || {};
      userCollection = allCollections[username] || {};
      render();
    })
    .catch(function(e) {
      console.error('Erreur chargement:', e);
      showError('Collection introuvable.', 'Ouvre d\'abord une Plush Box sur le stream !');
    });
}

// ── CALCUL SCORE ──────────────────────────────────────────────────────────────
function computeScore() {
  var score = 0;
  PLUSHIES.forEach(function(p) {
    score += (userCollection[p.id] || 0) * (RARITY_POINTS[p.rarity] || 1);
  });
  return score;
}

// ── RENDU ─────────────────────────────────────────────────────────────────────
function render() {
  var owned = PLUSHIES.filter(function(p) { return userCollection[p.id]; });
  var total = PLUSHIES.length;
  var score = computeScore();

  // Stats
  document.getElementById('stat-owned').textContent = owned.length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-score').textContent = score;
  document.getElementById('stat-pct').textContent   = Math.round(owned.length / total * 100) + '%';
  document.getElementById('stats-bar').style.display = '';
  document.getElementById('filters').style.display   = '';

  renderGrid(currentFilter);
}

function renderGrid(filter) {
  var content  = document.getElementById('main-content');
  var rarities = ['legendary','epic','rare','common'];
  var html     = '';

  rarities.forEach(function(rarity) {
    var list = PLUSHIES.filter(function(p) { return p.rarity === rarity; });

    // Filtre
    if (filter === 'owned')   list = list.filter(function(p) { return userCollection[p.id]; });
    if (filter === 'missing') list = list.filter(function(p) { return !userCollection[p.id]; });
    if (filter !== 'all' && filter !== 'owned' && filter !== 'missing' && filter !== rarity) return;
    if (list.length === 0) return;

    var ownedInRarity = list.filter(function(p) { return userCollection[p.id]; }).length;

    html += '<div class="rarity-section" data-rarity="' + rarity + '">';
    html += '<div class="rarity-header">';
    html += '<div class="rarity-line"></div>';
    html += '<div class="rarity-label ' + rarity + '">' + RARITY_LABELS[rarity].toUpperCase() + '</div>';
    html += '<div class="rarity-count">' + ownedInRarity + ' / ' + list.length + '</div>';
    html += '<div class="rarity-line"></div>';
    html += '</div>';
    html += '<div class="plush-grid">';

    list.forEach(function(p, i) {
      var count   = userCollection[p.id] || 0;
      var locked  = count === 0 ? 'locked' : '';
      var imgHtml = p.image && p.image !== ''
        ? '<img class="plush-img" src="' + p.image + '" alt="' + p.name + '" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'block\'">'
          + '<div class="plush-emoji" style="display:none">' + p.emoji + '</div>'
        : '<div class="plush-emoji">' + p.emoji + '</div>';

      html += '<div class="plush-card ' + rarity + ' ' + locked + '" style="animation-delay:' + (i * 0.02) + 's">';
      if (count > 1) html += '<div class="plush-count">×' + count + '</div>';
      html += '<div class="plush-img-wrap">' + imgHtml + '</div>';
      html += '<div class="plush-name">' + (locked ? '???' : p.name) + '</div>';
      html += '<div class="plush-rarity ' + rarity + '">' + (locked ? '—' : RARITY_LABELS[rarity]) + '</div>';
      html += '</div>';
    });

    html += '</div></div>';
  });

  if (html === '') {
    html = '<div class="empty-state">'
      + '<div class="empty-state-title">Aucune peluche ici</div>'
      + '<div class="empty-state-sub">Essaie un autre filtre</div>'
      + '</div>';
  }

  content.innerHTML = html;
}

function filterRarity(rarity, btn) {
  currentFilter = rarity;
  document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  renderGrid(rarity);
}

function showError(title, sub) {
  document.getElementById('main-content').innerHTML =
    '<div class="empty-state">'
    + '<div class="empty-state-title">' + title + '</div>'
    + '<div class="empty-state-sub">' + sub + '</div>'
    + '</div>';
}
